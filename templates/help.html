{% extends 'base.html' %}
{% block content %}
  <h2>Help Desk</h2>
  <p class="muted">Send a support request if you encounter issues while using the attendance system.</p>
  <form method="post">
    <input type="text" name="subject" placeholder="Subject" required>
    <textarea name="message" placeholder="Describe your issue" required></textarea>
    <button type="submit">Submit Request</button>
  </form>
{% endblock %}
